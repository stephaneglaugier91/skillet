name: Feature request
description: Suggest a new feature or improvement for skillet.
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What's the problem you're trying to solve? Why does the current behavior fall short?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe what you'd like to happen.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds, prior art, or other approaches you've thought about.

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
