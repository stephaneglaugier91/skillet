name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff + pre-commit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install project
        run: uv sync --frozen

      - name: Run pre-commit
        run: make pre-commit

  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install project
        run: uv sync --frozen

      - name: Run mypy
        run: make typecheck

  test:
    name: Test ${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
        os: [ubuntu-latest]
        include:
          - python-version: "3.12"
            os: macos-latest
          - python-version: "3.12"
            os: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install project
        run: uv sync --frozen --python ${{ matrix.python-version }}

      # Use uv directly so we can pass --python and stay portable on
      # Windows (where `make` isn't guaranteed). The Makefile mirrors this
      # exact command in `make test-cov`.
      - name: Run tests with coverage
        run: uv run --python ${{ matrix.python-version }} pytest --cov --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Build and check distribution
        run: make build-check

      # skillet ships its own skill in the wheel via the `skillet.skills`
      # entry point. The test suite uses an editable install so it
      # wouldn't catch a wheel that's missing the SKILL.md. Verify the
      # built wheel contains it.
      - name: Verify wheel ships the skillet skill
        run: |
          set -euo pipefail
          wheel=$(ls dist/skillet-*.whl)
          contents=$(python -m zipfile -l "$wheel")
          echo "$contents" | grep -q 'skillet/skills/skillet/SKILL.md' \
            || { echo "::error::SKILL.md is missing from the wheel"; \
                 echo "$contents"; exit 1; }
          echo "OK: $(echo "$contents" | grep 'skillet/skills/skillet/SKILL.md')"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
